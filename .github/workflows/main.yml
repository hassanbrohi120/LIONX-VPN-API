name: LIONX Auto Updater
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout with Token (Ye line login ka masla hal karegi)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests google-generativeai

      - name: Run Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_vpn.py

      # Step 2: Clean Commit & Push
      - name: Commit and Push
        run: |
          git config --global user.name "LIONX-Bot"
          git config --global user.email "bot@lionxvpn.com"
          
          # 1. File add karein
          git add services.json
          git commit -m "Hourly Agentic Update" || exit 0
          
          # 2. Pehle latest code fetch aur rebase karein taake conflict na ho
          git pull --rebase origin main
          
          # 3. Final Push
          git push origin main
