name: LIONX Auto Updater
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Poori history fetch karega taake conflict na aaye

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests google-generativeai

      - name: Run Script
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_vpn.py

      - name: Commit and Push
        env:
          MY_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config --global user.name "LIONX-Bot"
          git config --global user.email "bot@lionxvpn.com"
          
          # Pehle remote changes ko local code ke sath merge karein
          git pull --rebase https://x-access-token:${MY_TOKEN}@github.com/${{ github.repository }}.git main
          
          git add services.json
          git commit -m "Hourly Agentic Update" || exit 0
          
          # Final Push
          git push https://x-access-token:${MY_TOKEN}@github.com/${{ github.repository }}.git HEAD:main
