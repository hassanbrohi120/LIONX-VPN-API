name: LIONX Auto Updater
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests google-generativeai

      - name: Run Script
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_vpn.py

      - name: Commit and Push
        env:
          MY_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config --global user.name "LIONX-Bot"
          git config --global user.email "bot@lionxvpn.com"
          git add services.json
          git commit -m "Hourly Agentic Update" || exit 0
          # Force push taake rejected error khatam ho jaye
          git push --force https://x-access-token:${MY_TOKEN}@github.com/${{ github.repository }}.git HEAD:main
