name: LIONX Auto Updater

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-generativeai

      - name: Run script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_vpn.py

      - name: Commit & Push
        run: |
          git config user.name "LIONX-Bot"
          git config user.email "bot@lionxvpn.com"

          git add services.json
          git commit -m "Auto Update" || exit 0
          git push origin main
