name: LIONX Auto Updater
on:
  schedule:
    - cron: '0 * * * *' # Har ghante chalega
  workflow_dispatch:      # Manual button ke liye

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests google-generativeai

      - name: Run Script
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_vpn.py

      - name: Commit and Push
        run: |
          git config --global user.name "LIONX-Bot"
          git config --global user.email "bot@lionxvpn.com"
          git add services.json
          git commit -m "Hourly Agentic Update" || exit 0
          git push